name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install Dependencies
      run: npm install
    - name: Build Electron App
      run: npm run build
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Windows-EXE
        path: dist/*.exe
