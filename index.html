<!DOCTYPE html>
<html>
<head>
  <title>iTunes Delivery Manager</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f5; color: #333; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .drop-zone { border: 2px dashed #007aff; border-radius: 8px; padding: 40px; text-align: center; color: #007aff; cursor: pointer; transition: 0.3s; }
    .drop-zone:hover { background: #eef5ff; }
    .controls { margin-top: 20px; display: flex; gap: 10px; }
    button { background: #007aff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #005bb5; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
  </style>
</head>
<body>
  <div class="container">
    <h2>iTunes Media Hash Tool</h2>
    
    <div id="drop-zone" class="drop-zone">
      Drag & Drop Files or Folders Here
    </div>

    <div class="controls">
      <button id="pause-btn">Pause</button>
      <button id="stop-btn">Stop & Reset</button>
      <button id="download-btn">Download XML Manifest</button>
      <button id="rename-btn">Batch Rename (<hash>_<name>)</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>File Name</th>
          <th>Size (Bytes)</th>
          <th>MD5 Checksum</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="file-list">
        </tbody>
    </table>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
