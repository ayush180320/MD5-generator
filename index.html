<!DOCTYPE html>
<html>
<head>
  <title>Pro Media Hash Tool</title>
  <style>
    :root {
      --bg-base: #111111;
      --bg-panel: #1a1a1a;
      --bg-card: #222222;
      --bg-action-bar: #171717;
      --text-main: #f0f0f0;
      --text-muted: #8a8a8a;
      --accent: #007acc;
      --accent-hover: #0098ff;
      --border: #333333;
      --border-light: #444444;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #ffc107;
      --font-mono: "Consolas", "Courier New", monospace;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-base); color: var(--text-main); margin: 0; padding: 20px; user-select: none; }
    .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
    
    /* Top Toolbar */
    .toolbar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); padding: 15px 20px; border-radius: 4px; border: 1px solid var(--border); }
    .toolbar-left { display: flex; gap: 10px; }
    
    button { background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-light); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.15s; }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* Drop Zone */
    .drop-zone { border: 1px dashed var(--border-light); border-radius: 4px; padding: 30px; text-align: center; color: var(--text-muted); cursor: pointer; background: var(--bg-panel); font-size: 14px; font-weight: 500; }
    .drop-zone.dragover { border-color: var(--accent); background: rgba(0, 122, 204, 0.05); color: var(--accent); }
    
    /* File Cards (Replaces Table) */
    .file-list { display: flex; flex-direction: column; gap: 15px; }
    .file-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Card Data Section */
    .file-data { padding: 15px; display: grid; grid-template-columns: 2fr 1fr 2fr; gap: 15px; align-items: center; }
    .file-name { font-size: 14px; font-weight: 600; word-break: break-all; }
    .file-path { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .file-size { font-family: var(--font-mono); font-size: 13px; color: var(--accent); }
    
    /* Progress and Hash */
    .progress-section { display: flex; flex-direction: column; gap: 6px; }
    .status-text { font-size: 12px; font-weight: 500; color: var(--text-muted); display: flex; justify-content: space-between; }
    .progress-track { width: 100%; background: var(--bg-base); border: 1px solid var(--border); border-radius: 3px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }
    .progress-fill.paused { background: var(--warning); }
    .hash-display { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.5px; margin-top: 4px; }

    /* Dedicated Action Bar per File */
    .action-bar { background: var(--bg-action-bar); border-top: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .action-group { display: flex; gap: 8px; align-items: center; }
    
    /* Checksum Matcher */
    .matcher-group { display: flex; align-items: center; gap: 10px; }
    .matcher-input { background: var(--bg-base); border: 1px solid var(--border-light); color: var(--text-main); font-family: var(--font-mono); font-size: 12px; padding: 6px 10px; width: 260px; border-radius: 3px; outline: none; }
    .matcher-input:focus { border-color: var(--accent); }
    .match-badge { font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; }
    .match-badge.neutral { background: var(--border); color: var(--text-muted); }
    .match-badge.success { background: rgba(40, 167, 69, 0.15); color: var(--success); border: 1px solid var(--success); }
    .match-badge.fail { background: rgba(220, 53, 69, 0.15); color: var(--danger); border: 1px solid var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div>
        <h2 style="margin: 0; font-size: 16px; font-weight: 600;">Media Checksum Tool</h2>
      </div>
      <div class="toolbar-left">
        <button class="primary" id="btn-browse">Import Media</button>
        <button id="btn-reset">Clear Workspace</button>
      </div>
    </div>

    <div id="drop-zone" class="drop-zone">
      Drop Media Files or Directories Here
    </div>

    <div id="file-list" class="file-list">
      </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
