<!DOCTYPE html>
<html data-theme="light">
<head>
  <title>iTunes Delivery Manager</title>
  <style>
    /* Light/Dark Mode Variables */
    :root {
      --bg-color: #f4f4f5;
      --container-bg: white;
      --text-color: #333;
      --border-color: #ddd;
      --accent: #007aff;
      --accent-hover: #005bb5;
      --drop-bg: transparent;
      --drop-hover: #eef5ff;
    }
    [data-theme="dark"] {
      --bg-color: #1e1e1e;
      --container-bg: #2d2d2d;
      --text-color: #f5f5f5;
      --border-color: #444;
      --drop-hover: #3a3a3a;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
    .container { max-width: 1000px; margin: auto; background: var(--container-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    .header { display: flex; justify-content: space-between; align-items: center; }
    
    .drop-zone { border: 2px dashed var(--accent); border-radius: 8px; padding: 40px; text-align: center; color: var(--accent); cursor: pointer; transition: 0.3s; background: var(--drop-bg); margin-top: 20px; }
    .drop-zone:hover { background: var(--drop-hover); }
    
    .controls { margin-top: 20px; display: flex; gap: 10px; }
    button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: var(--accent-hover); }
    
    /* Video Player Area */
    .player-section { margin-top: 20px; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; display: none; }
    video { width: 100%; max-height: 400px; background: #000; border-radius: 5px; }

    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; }
    
    /* Progress Bar */
    .progress-bar-container { width: 100%; background: var(--border-color); border-radius: 4px; overflow: hidden; height: 10px; margin-top: 5px; }
    .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>iTunes Media Hash Tool</h2>
      <button id="theme-toggle">Toggle Dark Mode</button>
    </div>
    
    <div id="drop-zone" class="drop-zone">
      Drag & Drop Media Files Here
    </div>

    <div id="player-section" class="player-section">
      <h3>Media Review (Manual Cropping Check)</h3>
      <video id="media-player" controls></video>
    </div>

    <div class="controls">
      <button id="stop-btn">Stop & Reset</button>
      <button id="rename-btn">Batch Rename</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>File Name</th>
          <th>Status / Progress</th>
          <th>MD5 Checksum</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="file-list">
        </tbody>
    </table>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
