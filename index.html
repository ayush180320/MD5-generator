<!DOCTYPE html>
<html>
<head>
  <title>Pro Media Hash Tool</title>
  <style>
    :root {
      --bg-dark: #121212;
      --bg-panel: #1e1e1e;
      --bg-hover: #2a2a2a;
      --text-main: #e0e0e0;
      --text-muted: #888888;
      --accent: #007acc;
      --accent-hover: #0098ff;
      --border: #333333;
      --danger: #cc3333;
    }

    body { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; user-select: none; }
    .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
    
    .toolbar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); padding: 15px 20px; border-radius: 6px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .toolbar-left { display: flex; gap: 10px; }
    
    button { background: var(--bg-hover); color: var(--text-main); border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    button.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: var(--danger); color: white; }

    .drop-zone { border: 2px dashed var(--border); border-radius: 6px; padding: 40px; text-align: center; color: var(--text-muted); cursor: pointer; transition: 0.3s; background: var(--bg-panel); }
    .drop-zone.dragover { border-color: var(--accent); background: #007acc11; color: var(--accent); }
    
    table { width: 100%; border-collapse: collapse; background: var(--bg-panel); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #181818; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:hover { background: var(--bg-hover); }
    
    .progress-container { width: 100%; background: var(--border); border-radius: 3px; height: 6px; margin-top: 5px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }
    .progress-bar.paused { background: #d4a017; }
    
    .actions { display: flex; gap: 5px; }
    .status-text { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div>
        <h2 style="margin: 0; font-size: 18px; color: white;">Pro Media Hash</h2>
        <span style="font-size: 12px; color: var(--text-muted);">High-Speed Integrity Verification</span>
      </div>
      <div class="toolbar-left">
        <button class="primary" id="btn-browse">Browse Files</button>
        <button class="danger" id="btn-reset">Reset Workspace</button>
      </div>
    </div>

    <div id="drop-zone" class="drop-zone">
      Drag and Drop Media Files or Folders Here
    </div>

    <table>
      <thead>
        <tr>
          <th width="30%">File Name</th>
          <th width="15%">Size</th>
          <th width="25%">Progress / Status</th>
          <th width="15%">MD5 Checksum</th>
          <th width="15%">Controls</th>
        </tr>
      </thead>
      <tbody id="file-list">
        </tbody>
    </table>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
